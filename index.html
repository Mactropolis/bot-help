<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda do Bot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
        }

        header {
            padding: 16px;
            text-align: center;
            background: #161b22;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 12px;
        }

        .menu-card {
            background: #161b22;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: block;
            text-decoration: none;
            transition: 0.2s;
        }

        .menu-card:hover {
            background: #21262d;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            color: #58a6ff;
        }

        .desc {
            font-size: 14px;
            margin-top: 4px;
            color: #c9d1d9;
        }

        .card {
            background: #161b22;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            background: #21262d;
        }

        .command {
            font-size: 16px;
            font-weight: bold;
            color: #58a6ff;
        }

        .detail {
            display: none;
            margin-top: 10px;
            font-size: 14px;
            border-top: 1px solid #30363d;
            padding-top: 10px;
        }

        .active .detail {
            display: block;
        }

        .search {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 12px;
            background: #21262d;
            color: white;
        }
    </style>
</head>

<body>

    <header>🤖 Ajuda do Bot</header>

    <div class="container">

        <input class="search" placeholder="Buscar comando..." onkeyup="filterCommands(this.value)">

        <div class="menu-card">
            <div class="title">⚙️ /settings</div>
            <div class="desc">
                No Discord, digite:<br><br>
                <span style="background:#0d1117;padding:6px 10px;border-radius:6px;font-family:monospace;">
                    /settings
                </span><br><br>
                para abrir o menu de configurações.
            </div>
        </div>

        <!-- COMANDOS -->
        <div class="card" onclick="toggle(this)">
            <div class="command">/ban</div>
            <div class="desc">Remove um usuário</div>
            <div class="detail">
                Uso: /ban @usuario motivo<br>
                Permissão: Admin
            </div>
        </div>

        <div class="card" onclick="toggle(this)">
            <div class="command">/kick</div>
            <div class="desc">Expulsa um usuário</div>
            <div class="detail">
                Uso: /kick @usuario<br>
                Permissão: Moderador
            </div>
        </div>

        <div class="card" onclick="toggle(this)">
            <div class="command">/help</div>
            <div class="desc">Mostra ajuda</div>
            <div class="detail">
                Uso: /help comando<br>
                Exemplo: /help ban
            </div>
        </div>

    </div>

    <script>
        function toggle(el) {
            el.classList.toggle("active");
        }

        function filterCommands(value) {
            const cards = document.querySelectorAll(".card, .menu-card");
            value = value.toLowerCase();

            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(value) ? "block" : "none";
            });
        }
    </script>

</body>

</html>
